<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hope you like it</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    /* 🌷 BACKGROUND */
    #tulipWrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -2;
    }

    .tulip-track {
      position: absolute;
      width: 100%;
    }

    .tulip-img {
      width: 100%;
      display: block;
    }

    #overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(255, 105, 180, 0.25);
      z-index: -1;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .glass {
      background: rgba(0, 0, 0, 0.5);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    /* 📸 PORTRAIT IMAGE STYLE */
    .student-img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border-radius: 15px;
    }

    /* Carousel image size control */
    .carousel .student-img {
      max-width: 350px;
      margin: auto;
    }

    footer {
      background: rgba(0,0,0,0.4);
    }
  </style>
</head>

<body>

  <!-- 🌷 Background -->
  <div id="tulipWrapper">
    <div class="tulip-track" id="tulipTrack">
      <img src="tulips.jpg" class="tulip-img">
      <img src="tulips.jpg" class="tulip-img">
    </div>
  </div>

  <div id="overlay"></div>

  <!-- 🎓 HERO -->
  <section class="hero container">
    <div class="glass">
      <h1 class="display-4">🎓 Congratulations Angel💋</h1>
      <p class="lead">Blooming into your bright future 🌷</p>

      <button class="btn btn-light mt-3" data-bs-toggle="modal" data-bs-target="#tulipModal">
        Click Me
      </button>
    </div>
  </section>

  <!-- 📸 CAROUSEL -->
  <div class="container py-5">
    <h2 class="text-center mb-4">Angelica's Photos</h2>

    <div id="photoCarousel" class="carousel slide" data-bs-ride="carousel">

      <!-- Indicators -->
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="5"></button>
        <button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="6"></button>
        <button type="button" data-bs-target="#photoCarousel" data-bs-slide-to="7"></button>
      </div>

      <!-- Slides -->
      <div class="carousel-inner">

        <div class="carousel-item active text-center">
          <img src="4.jpg" class="student-img">
        </div>

        <div class="carousel-item text-center">
          <img src="gorg.jpg" class="student-img">
        </div>

        <div class="carousel-item text-center">
          <img src="7.jpg" class="student-img">
        </div>

        <div class="carousel-item text-center">
          <img src="cutie.jpg" class="student-img">
        </div>

        <div class="carousel-item text-center">
          <img src="3.jpg" class="student-img">
        </div>

        <div class="carousel-item text-center">
          <img src="2.jpg" class="student-img">
        </div>

        <div class="carousel-item text-center">
          <img src="5.jpg" class="student-img">
        </div>

        <div class="carousel-item text-center">
          <img src="6.jpg" class="student-img">
        </div>

      </div>

      <!-- Controls -->
      <button class="carousel-control-prev" type="button" data-bs-target="#photoCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#photoCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>
  </div>

  <!-- 🌷 MODAL -->
  <div class="modal fade" id="tulipModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-white">
        
        <div class="modal-header border-0">
          <h5 class="modal-title">🌷 A Bouquet For You</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body text-center">
          <img src="cute.webp" class="img-fluid rounded">
          <p class="mt-3">Congratulations on your graduation I'm so prud of you Angell mwa💋💋💋💋!</p>
        </div>

      </div>
    </div>
  </div>

  <!-- 🔻 FOOTER -->
  <footer class="text-center py-3">
    <p>© 2026 Graduation Celebration</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- 🌷 Background Animation -->
  <script>
    let scrollY = 0;

    function animateTulips() {
      scrollY += 0.4;

      const track = document.getElementById("tulipTrack");
      track.style.transform = `translateY(-${scrollY}px)`;

      if (scrollY >= window.innerHeight) {
        scrollY = 0;
      }

      requestAnimationFrame(animateTulips);
    }

    animateTulips();
  </script>

</body>
</html>
